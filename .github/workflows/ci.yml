name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate structure
        run: |
          echo "Checking required files..."
          [ -f packages/analysis-agent/skills/duplicate-detection/SKILL.md ] || exit 1
          [ -f packages/analysis-agent/skills/dead-code-analysis/SKILL.md ] || exit 1
          [ -f packages/analysis-agent/skills/analysis-orchestrator/SKILL.md ] || exit 1
          [ -f packages/analysis-agent/agents/codebase-analysis.md ] || exit 1
          echo "All required files present!"

      - name: Validate SKILL.md files
        run: |
          for file in packages/analysis-agent/skills/*/SKILL.md; do
            echo "Checking $file..."
            if [ ! -s "$file" ]; then
              echo "ERROR: $file is empty or missing"
              exit 1
            fi
          done
          echo "All SKILL.md files valid!"
